name: Kimi Code Review

on:
  pull_request:
    types: [opened, synchronize] # PR 생성·새 커밋 시 자동

permissions:
  contents: read
  pull-requests: write # PR에 리뷰 댓글

jobs:
  kimi-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR diff 추출
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" > pr_diff.txt

      - name: Kimi 리뷰 요청 (OpenRouter)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q '.body')
          DIFF_CONTENT=$(head -c 100000 pr_diff.txt) # diff 100KB 제한(토큰 절약)

          # 모델 슬러그가 다르면 첫 실행 로그에서 확인해 수정 (OpenRouter 모델 목록 기준)
          REQUEST_BODY=$(jq -n \
            --arg t "$PR_TITLE" --arg b "$PR_BODY" --arg d "$DIFF_CONTENT" \
            '{
              model: "moonshotai/kimi-k2.6",
              messages: [
                { role: "system", content: "당신은 실용적인 코드 리뷰어입니다. 한국어로 간결하게 리뷰하세요.\n\n중점:\n- 실제 버그·런타임 에러 가능성\n- 명백한 성능 문제\n- Next.js/React 안티패턴\n\n주의:\n- 이론적으로만 가능한 엣지 케이스는 무시\n- 과도한 방어 코딩을 제안하지 마세요\n- diff(바뀐 부분)만 보이므로, 바뀌지 않은 주변 코드의 맥락을 단정하지 마세요\n- 문제가 없으면 \"특이사항 없음\"으로 짧게 마무리하세요" },
                { role: "user", content: ("PR 제목: " + $t + "\n\nPR 설명: " + $b + "\n\n변경사항(diff):\n\n" + $d) }
              ],
              temperature: 0.3,
              max_tokens: 4000
            }')

          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/$REPO" \
            -H "X-Title: Kimi Code Review" \
            -d "$REQUEST_BODY")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "리뷰 생성 실패 — Actions 로그 확인"')
          echo "$RESPONSE" | jq -r '.error // empty'
          printf "## 🤖 Kimi 코드리뷰 (kimi-k2.6 · OpenRouter)\n\n%s\n" "$CONTENT" \
            | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -

      - name: Cleanup
        if: always()
        run: rm -f pr_diff.txt
