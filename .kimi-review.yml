# Kimi Code Review 설정 (howardpen9/kimi-code-reviewer)
language: ko # 리뷰 코멘트 한국어
model: kimi-k2.6 # 코딩 워크로드 최강 (레거시 K2는 EOL 2026-05-25 — 사용 금지)

review:
  auto:
    enabled: true
    onOpen: true # PR 생성 시
    onPush: true # 새 커밋 푸시 시
  aspects:
    bugs: true
    security: true
    performance: true
    style: true
    bestPractices: true
  minSeverity: suggestion
  maxAnnotations: 30

files:
  exclude:
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/dist/**"
